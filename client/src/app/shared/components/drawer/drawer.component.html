<!-- Backdrop -->
<div
  class="fixed inset-0 z-40 bg-black transition-opacity duration-300"
  [class.opacity-50]="isOpen()"
  [class.opacity-0]="!isOpen()"
  [class.pointer-events-none]="!isOpen()"
  aria-hidden="true"
></div>

<!-- Drawer panel -->
<div
  [cdkTrapFocus]="isOpen()"
  [cdkTrapFocusAutoCapture]="isOpen()"
  class="fixed inset-y-0 right-0 z-50 flex w-full h-full flex-col bg-white shadow-xl transition-transform duration-300 sm:duration-500 {{ maxWidth() }}"
  [class.translate-x-0]="isOpen()"
  [class.translate-x-full]="!isOpen()"
  role="dialog"
  aria-modal="true"
>
  <!-- Header -->
  <div class="mx-4 py-3 sm:mx-6 border-b border-stone-900/20">
    <div class="flex items-start justify-between space-x-3">
      <div class="space-y-1">
        <h2 class="text-xl font-semibold text-stone-950">{{ title() }}</h2>
        @if (text()) {
          <p class="text-sm text-stone-800">{{ text() }}</p>
        }
      </div>
      <div class="flex h-7 items-center">
        <button type="button"
                class="relative rounded-md text-gray-400 hover:text-gray-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
                (click)="close()">
          <span class="absolute -inset-2.5"></span>
          <span class="sr-only">Close panel</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon"
               aria-hidden="true" class="size-6">
            <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="overflow-y-auto">
    <ng-content></ng-content>
  </div>

  <!-- Action buttons -->
  <div class="shrink-0 mx-4 py-3 border-t border-stone-900/20 sm:mx-6">
    <div class="flex justify-end space-x-3">
      <button type="button"
              class="button button-cancel"
              (click)="close()">
        Cancel
      </button>
      <button type="submit"
              class="button button-primary"
              (click)="submit()">
        Create
      </button>
    </div>
  </div>
</div>
