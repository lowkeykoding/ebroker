<div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
  <!-- Search -->
  <div class="relative rounded-md shadow-xs">
    <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
      <svg class="size-4 text-gray-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" />
      </svg>
    </div>
    <input
      type="text"
      (input)="onSearchInput($event)"
      placeholder="Search listings..."
      class="block w-full rounded-md bg-white py-1.5 pr-3 pl-9 text-sm text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-sky-600 sm:w-64"
    />
  </div>

  <!-- Status filter segmented button group -->
  <span class="isolate inline-flex rounded-md shadow-xs">
    @for (status of listingStatuses(); track status.label; let i = $index) {
      <button
        type="button"
        (click)="onFilterSelect(status.id)"
        [class]="
          'relative inline-flex items-center px-3 py-2 text-sm font-semibold focus:z-10 ' +
          (isFirst(i) ? 'rounded-l-md ' : '') +
          (isLast(i) ? 'rounded-r-md ' : '') +
          (!isFirst(i) ? '-ml-px ' : '') +
          (isActive(status.id)
            ? 'bg-sky-600 text-white hover:bg-sky-500 z-10'
            : 'bg-white text-gray-900 inset-ring-1 inset-ring-gray-300 hover:bg-gray-50')
        "
      >
        {{ status.label }}
      </button>
    }
  </span>
</div>
