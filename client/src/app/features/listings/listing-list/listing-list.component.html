<div pageTitle class="flex items-center justify-between mb-8">
  <div>
    <h1 class="text-3xl font-bold tracking-tight text-gray-900">Listings</h1>
    <p class="mt-1 text-sm text-gray-500">Manage your property listings</p>
  </div>
  <button (click)="drawer.open()"
          type="button"
          class="button button-primary"
  >
    Create Listing
  </button>
</div>

@if (loading()) {
  <div class="flex items-center justify-center py-12">
    <div class="text-sm text-gray-500">Loading listings...</div>
  </div>
} @else if (error()) {
  <div class="rounded-md bg-red-50 p-4 mb-6">
    <p class="text-sm text-red-700">{{ error() }}</p>
  </div>
} @else {
  <!--    <app-listing-stats-bar--><!--        [listings]="listings()"--><!--      ></app-listing-stats-bar>-->

  <div class="mt-6">
    <app-listing-filters
      [listingStatuses]="allListingStatuses()"
      (statusFilterChange)="onStatusFilterChange($event)"
      (searchChange)="onSearchChange($event)"
    ></app-listing-filters>
  </div>

  <div class="mt-6">
    <app-listing-table
      [searchTerm]="searchTerm()"
      [listings]="listings()"
      [statusFilter]="statusFilter()"
    ></app-listing-table>

  </div>
}

<app-drawer #drawer
            [maxWidth]="'max-w-5xl'"
            title="Create New Listing"
            (submitted)="createListing.onSubmit()"
            (closed)="createListing.onCancel()">
  <app-create-listing-drawer #createListing [listingStatuses]="listingStatuses()"
                            [propertyTypes]="propertyTypes()"
                            (listingCreated)="onListingCreated($event)"/>
</app-drawer>
